# Use UI 2.26.x: 2.28+ has a broken config (tcp://... unmarshal into int). Rely on env vars.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: aggrov5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.26.2
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: TEMPORAL_UI_PORT
              value: "8080"
            - name: TEMPORAL_DEFAULT_NAMESPACE
              value: default
            - name: TEMPORAL_CORS_ORIGINS
              value: http://localhost:3000
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: aggrov5
spec:
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
