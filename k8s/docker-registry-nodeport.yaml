# Extra Service: same registry pods, exposed on a fixed NodePort for pushes from the host (Tilt, docker).
# Safe on local k3d / private network. Do NOT expose this NodePort on a public VPS — use Ingress instead.
apiVersion: v1
kind: Service
metadata:
  name: docker-registry-nodeport
  namespace: aggrov5
  labels:
    app: docker-registry
spec:
  type: NodePort
  selector:
    app: docker-registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 30500
