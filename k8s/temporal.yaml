# Single-node dev server (Temporalite-style): no ringpop, no Postgres for Temporal.
# For production or multi-node, use the Helm chart or auto-setup with proper membership.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: aggrov5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/temporal:latest
          args: ["server", "start-dev", "--ip", "0.0.0.0"]
          ports:
            - containerPort: 7233
          startupProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 5
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 0
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: aggrov5
spec:
  selector:
    app: temporal
  ports:
    - port: 7233
      targetPort: 7233
  type: ClusterIP
