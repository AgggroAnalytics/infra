apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-gateway
  namespace: aggrov5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-gateway
  template:
    metadata:
      labels:
        app: minio-gateway
    spec:
      containers:
        - name: gateway
          image: minio-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
            - name: GATEWAY_PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: minio-gateway
  namespace: aggrov5
spec:
  selector:
    app: minio-gateway
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
